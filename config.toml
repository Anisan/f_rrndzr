# Обязательные поля
secret = ""  # Заполнится через ENV или сгенерируется
bind-to = "0.0.0.0:3128"

# Опционально: настройки для Railway
[defense]
# Включаем защиту от replay-атак
anti-replay = true

# Опционально: FakeTLS (маскировка под домен)
[defense.doppelganger]
# Включить эмуляцию статистики трафика
enable = true
# URLs для сбора статистики (замените на свой домен при использовании FakeTLS)
# urls = ["https://example.com/"]

# Логирование
[logger]
level = "info"
